<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Lab: Challenge</title>
    <!-- Este script é o "motor" que faz o Java correr no browser -->
    <script src="https://cjrtnc.leaningtech.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        // Inicia o motor do Java
        cheerpjInit();
        // Cria o ecrã do jogo (ajustado ao tamanho do telemóvel)
        cheerpjCreateDisplay(900, 700, document.getElementById("container"));
        // Corre o teu jogo (Troca 'O_TEU_ARQUIVO.jar' pelo nome real do teu jar)
        cheerpjRunMain("JogoQuimica", "/app/Jogo.jar");
    </script>
</body>
</html>
