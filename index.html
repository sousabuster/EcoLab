<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Lab: Challenge</title>
    <!-- O motor do Java -->
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: white; display: flex; justify-content: center; align-items: center; text-align: center; }
        #container { width: 900px; height: 700px; max-width: 100vw; max-height: 100vh; }
    </style>
</head>
<body>
    <div id="container">A carregar laboratório...</div>
    <script>
        // Esta função garante que o script só corre depois do loader.js estar pronto
        window.addEventListener('load', async function() {
            try {
                // Inicia o motor
                await cheerpjInit();
                // Cria o ecrã dentro do container
                cheerpjCreateDisplay(900, 700, document.getElementById("container"));
                // Corre o JAR (confirma se o nome no GitHub é Jogo.jar)
                cheerpjRunMain("JogoQuimica", "/app/Jogo.jar");
            } catch (e) {
                console.error("Erro ao iniciar o CheerpJ:", e);
            }
        });
    </script>
</body>
</html>
